<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 技术栈全景地图</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    background: #f5f4f0;
    color: #2c2c2a;
    min-height: 100vh;
    padding: 32px 16px;
  }
  .container { max-width: 780px; margin: 0 auto; }
  h1 {
    font-size: 20px;
    font-weight: 500;
    text-align: center;
    margin-bottom: 6px;
    color: #2c2c2a;
  }
  .subtitle {
    font-size: 13px;
    text-align: center;
    color: #888780;
    margin-bottom: 24px;
  }
  .tabs {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .btn-tab {
    padding: 6px 20px;
    border-radius: 20px;
    border: 1px solid #d3d1c7;
    background: transparent;
    color: #5f5e5a;
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    font-family: inherit;
  }
  .btn-tab.active {
    background: #2c2c2a;
    color: #f5f4f0;
    border-color: transparent;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  svg { display: block; width: 100%; }
  #view-dynamic { display: none; }

  /* tooltip */
  .tooltip {
    position: fixed;
    background: #2c2c2a;
    color: #f5f4f0;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 6px;
    pointer-events: none;
    opacity: 0;
    transition: opacity .15s;
    max-width: 200px;
    line-height: 1.5;
    z-index: 100;
  }
  .tooltip.show { opacity: 1; }

  .node-g { cursor: pointer; }
  .node-g:hover rect { opacity: 0.82; }

  @media (max-width: 600px) {
    h1 { font-size: 17px; }
    .card { padding: 4px; }
  }
</style>
</head>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"></div>

<script>
function switchView(view, btn) {
  document.getElementById('view-structure').style.display = view === 'structure' ? 'block' : 'none';
  document.getElementById('view-dynamic').style.display = view === 'dynamic' ? 'block' : 'none';
  document.querySelectorAll('.btn-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function showInfo(title, desc) {
  const tip = document.getElementById('tooltip');
  tip.innerHTML = '<strong>' + title + '</strong><br>' + desc;
  tip.classList.add('show');
  setTimeout(() => tip.classList.remove('show'), 4000);
}

document.addEventListener('mousemove', function(e) {
  const tip = document.getElementById('tooltip');
  tip.style.left = (e.clientX + 12) + 'px';
  tip.style.top = (e.clientY - 10) + 'px';
});
</script>
